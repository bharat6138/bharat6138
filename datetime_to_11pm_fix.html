<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DateTime Selector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/jquery-datetimepicker@2.5.20/build/jquery.datetimepicker.min.css">
    <script
        src="https://cdn.jsdelivr.net/npm/jquery-datetimepicker@2.5.20/build/jquery.datetimepicker.full.min.js"></script>

    <style>
        body {
            background: #f5f6f8;
        }

        .card {
            max-width: 500px;
            margin: 60px auto;
            padding: 20px;
            border-radius: 12px;
        }

        input {
            cursor: pointer;
            background: #fff !important;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card shadow">
            <h4 class="mb-4">Date Time Selector</h4>

            <div class="mb-3">
                <label>From DateTime</label>
                <input type="text" id="fromDateTime" class="form-control" readonly>
            </div>

            <div class="mb-3">
                <label>To DateTime</label>
                <input type="text" id="toDateTime" class="form-control" readonly>
            </div>
        </div>
    </div>

    <script>
        $(function () {

            let syncing = false;
            const MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

            function roundHour(d) { let x = new Date(d); x.setMinutes(0, 0, 0); return x; }
            function addHour(d) { let x = new Date(d); x.setHours(x.getHours() + 1); return x; }
            function subHour(d) { let x = new Date(d); x.setHours(x.getHours() - 1); return x; }

            function isToday(d) {
                let t = new Date();
                return d && d.toDateString() === t.toDateString();
            }

            function formatDate(d) {
                let h = d.getHours(), ampm = h >= 12 ? 'PM' : 'AM', h12 = h % 12 || 12;
                return `${String(d.getDate()).padStart(2, '0')} ${MONTHS[d.getMonth()]} ${d.getFullYear()} ${String(h12).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')} ${ampm}`;
            }

            function parseVal(id) {
                let str = $('#' + id).val(); if (!str) return null;
                let m = str.match(/(\d{2}) (\w{3}) (\d{4}) (\d{2}):(\d{2}) (AM|PM)/);
                if (!m) return null;
                let mon = MONTHS.indexOf(m[2]);
                let h = parseInt(m[4]), min = parseInt(m[5]);
                if (m[6] === 'PM' && h !== 12) h += 12;
                if (m[6] === 'AM' && h === 12) h = 0;
                return new Date(parseInt(m[3]), mon, parseInt(m[1]), h, min, 0, 0);
            }

            // 🔥 FIXED maxTime (allow 11 PM)
            function fromMaxTime() {
                let now = new Date();
                let rounded = roundHour(now);
                let next = addHour(rounded);

                let h = next.getHours();
                if (h > 23) h = 23;

                return String(h).padStart(2, '0') + ":00";
            }

            function forceSet(id, date) {
                $('#' + id).datetimepicker('destroy');
                $('#' + id).val(formatDate(date));
                $('#' + id).datetimepicker({
                    format: 'd M Y h:i A',
                    formatTime: 'h:i A',
                    step: 60,
                    maxDate: 0,
                    validateOnBlur: false
                });
            }

            // =========================
            // FROM → TO
            // =========================
            function syncFromChanged() {
                if (syncing) return; syncing = true;

                let from = parseVal('fromDateTime');
                if (!from) { syncing = false; return; }

                let to = addHour(from);

                // 🔥 APPLY maxTime FIX
                if (isToday(from)) {
                    $('#fromDateTime').datetimepicker('setOptions', {
                        maxTime: fromMaxTime()
                    });
                } else {
                    $('#fromDateTime').datetimepicker('setOptions', { maxTime: false });
                }

                forceSet('toDateTime', to);
                bindTo();

                syncing = false;
            }

            // =========================
            // TO → FROM
            // =========================
            function syncToChanged() {
                if (syncing) return; syncing = true;

                let to = parseVal('toDateTime');
                if (!to) { syncing = false; return; }

                let from = subHour(to);

                forceSet('fromDateTime', from);
                bindFrom();

                syncing = false;
            }

            // =========================
            // BIND EVENTS
            // =========================
            function bindFrom() {
                $('#fromDateTime').datetimepicker('setOptions', {
                    onSelectTime: () => setTimeout(syncFromChanged, 0),

                    onSelectDate: function (ct) {
                        if (isToday(ct)) {
                            this.setOptions({
                                maxTime: fromMaxTime()
                            });
                        } else {
                            this.setOptions({ maxTime: false });
                        }
                        setTimeout(syncFromChanged, 0);
                    },

                    onShow: function () {
                        let val = parseVal('fromDateTime');

                        if (val && isToday(val)) {
                            this.setOptions({
                                maxTime: fromMaxTime()
                            });
                        } else {
                            this.setOptions({ maxTime: false });
                        }
                    }
                });
            }

            function bindTo() {
                $('#toDateTime').datetimepicker('setOptions', {
                    onSelectTime: () => setTimeout(syncToChanged, 0),
                    onSelectDate: () => setTimeout(syncToChanged, 0),
                    onShow: function () {
                        this.setOptions({ maxTime: false });
                    }
                });
            }

            // =========================
            // INIT
            // =========================
            let now = new Date();
            let fromDefault = roundHour(now);
            let toDefault = addHour(fromDefault);

            $('#fromDateTime').datetimepicker({
                format: 'd M Y h:i A',
                formatTime: 'h:i A',
                step: 60,
                maxDate: 0,
                maxTime: fromMaxTime(),
                value: fromDefault,
                validateOnBlur: false
            });
            bindFrom();

            $('#toDateTime').datetimepicker({
                format: 'd M Y h:i A',
                formatTime: 'h:i A',
                step: 60,
                maxDate: 0,
                value: toDefault,
                validateOnBlur: false
            });
            bindTo();

        });
    </script>

</body>

</html>
